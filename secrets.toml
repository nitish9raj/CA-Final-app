# .streamlit/secrets.toml
# ══════════════════════════════════════════════════════════════
#  CA Final AI Suite v7.0 — API Keys Configuration
#  Fill in each value below, then deploy to Streamlit Cloud
# ══════════════════════════════════════════════════════════════

# ── SUPABASE (PostgreSQL database) ────────────────────────────
# Steps:
#  1. Go to https://supabase.com → Sign up (free, no credit card)
#  2. Click "New Project" → choose a name & password
#  3. Once created → Settings → API
#  4. Copy "Project URL" → paste as SUPABASE_URL below
#  5. Under "Project API keys" → copy "service_role" key (NOT anon)
#     (service_role lets the backend bypass Row Level Security safely)
#  6. Go to "SQL Editor" → paste and run schema.sql from this folder

SUPABASE_URL = "https://kbbqweacaaxtsthxudmy.supabase.co"
SUPABASE_KEY = "your-key-here"  # service_role key


# ── FIREBASE (Authentication) ─────────────────────────────────
# Steps:
#  1. Go to https://console.firebase.google.com
#  2. Click "Add project" → give it a name
#  3. Left sidebar → Authentication → Get Started
#  4. Sign-in method tab → Enable:
#       • Email/Password   (easiest, no extra setup)
#       • Google           (needs OAuth client ID below)
#       • Phone            (needs billing enabled on Firebase)
#  5. Project Settings (gear icon) → General → "Your apps"
#  6. Click </> (Web app) → register → copy the config values below

FIREBASE_API_KEY             = "your-key-here"
FIREBASE_AUTH_DOMAIN         = "ca-final-auth.firebaseapp.com"
FIREBASE_PROJECT_ID          = "ca-final-auth"
FIREBASE_STORAGE_BUCKET      = "ca-final-auth.firebasestorage.app"
FIREBASE_MESSAGING_SENDER_ID = "1032222855048"
FIREBASE_APP_ID              = "1:1032222855048:web:365e76c493f685be5cf43d"


# ── GOOGLE OAUTH (for "Sign in with Google" button) ───────────
# Steps:
#  1. Go to https://console.cloud.google.com
#  2. Select your Firebase project
#  3. APIs & Services → Credentials → Create Credentials → OAuth 2.0 Client
#  4. Application type: Web application
#  5. Authorized redirect URIs: add your Streamlit app URL
#     (e.g. https://your-app.streamlit.app)
#  6. Copy Client ID and Client Secret below

GOOGLE_CLIENT_ID     = "123456789-abc.apps.googleusercontent.com"
GOOGLE_CLIENT_SECRET = "GOCSPX-..."
OAUTH_REDIRECT_URI   = "https://your-app.streamlit.app"
#                       ^ Set this to your actual deployed URL
#                         For local testing: http://localhost:8501


# ── ANTHROPIC (Claude AI features inside the app) ─────────────
# Steps:
#  1. Go to https://console.anthropic.com
#  2. API Keys → Create new key
#  3. Paste below

ANTHROPIC_API_KEY = "sk-ant-api03-..."
